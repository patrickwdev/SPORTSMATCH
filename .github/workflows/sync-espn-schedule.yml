name: Sync ESPN schedules (all leagues)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    strategy:
      fail-fast: false
      matrix:
        league: [NFL, MLB, NBA, NHL, MLS, WNBA, NCAAB, NCAAW]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Prepare Supabase credentials
        run: bash scripts/ci/prepare-supabase-env.sh
      - name: Daily sync ${{ matrix.league }}
        run: node scripts/sync-espn.mjs ${{ matrix.league }}
