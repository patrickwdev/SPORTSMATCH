name: Sync ESPN live scores (NFL, MLB, NHL, MLS)

on:
  schedule:
    # Every 3 minutes — NFL, MLB, NHL, MLS scores/status
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    strategy:
      fail-fast: false
      matrix:
        league: [NFL, MLB, NHL, MLS]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - name: Prepare Supabase credentials
        run: bash scripts/ci/prepare-supabase-env.sh
      - name: Live sync ${{ matrix.league }}
        run: node scripts/sync-espn.mjs ${{ matrix.league }} --live
